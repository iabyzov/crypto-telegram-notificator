name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: crypto-telegram-notificator
  REPOSITORY: crypto-telegram-notificator
  IMAGE_NAME: telegram-handler

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate Docker to Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                       -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest \
                       .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      - name: Prepare service YAML
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          sed -e "s|IMAGE_PLACEHOLDER|${IMAGE}|g" \
              -e "s|TELEGRAM_BOT_TOKEN_PLACEHOLDER|${{ secrets.TELEGRAM_BOT_TOKEN }}|g" \
              -e "s|GCP_PROJECT_ID_PLACEHOLDER|${{ secrets.GCP_PROJECT_ID }}|g" \
              -e "s|CMC_API_KEY_PLACEHOLDER|${{ secrets.CMC_API_KEY }}|g" \
              -e "s|UPSTASH_REDIS_URL_PLACEHOLDER|${{ secrets.UPSTASH_REDIS_URL }}|g" \
              -e "s|KAFKA_BOOTSTRAP_SERVER_PLACEHOLDER|${{ secrets.KAFKA_BOOTSTRAP_SERVER }}|g" \                                                                                                                                                                       
              -e "s|KAFKA_API_KEY_PLACEHOLDER|${{ secrets.KAFKA_API_KEY }}|g" \                                                                                                                                                                                         
              -e "s|KAFKA_API_SECRET_PLACEHOLDER|${{ secrets.KAFKA_API_SECRET }}|g" \   
              run-service-with-sidecar.yaml > /tmp/service.yaml

      - name: Deploy multi-container service to Cloud Run
        run: |
          gcloud run services replace /tmp/service.yaml --region=${{ env.REGION }}
